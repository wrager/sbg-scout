name: CI

on:
  push:
    branches-ignore:
      # Игнорируем временные ветки, которые GitHub делает под stash/diff.
      - 'gh-readonly-queue/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: detekt
        run: ./gradlew detekt

      - name: Unit tests
        run: ./gradlew testE2eUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build e2e APK
        run: ./gradlew assembleE2e
